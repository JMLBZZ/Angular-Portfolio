<!-- Si href existe => <a> -->
<a
  *ngIf="href; else asButton"
  [href]="href"
  [attr.aria-label]="ariaLabel"
  [attr.target]="target"
  [attr.rel]="computedRel"
  [class]="classes"
>
  <i
    [class]="iconClass + ' ' + iconSizeClass + ' ' + iconExtraClass"
    aria-hidden="true"
  ></i>
</a>

<!-- Sinon => <button> -->
<ng-template #asButton>
  <button
    type="button"
    [attr.aria-label]="ariaLabel"
    [disabled]="disabled"
    [class]="classes"
    (click)="onClick()"
  >
    <i
      [class]="iconClass + ' ' + iconSizeClass + ' ' + iconExtraClass"
      aria-hidden="true"
    ></i>
  </button>
</ng-template>
