<a
  *ngIf="href; else asButton"
  [href]="href"
  [attr.target]="target"
  [attr.rel]="computedRel"
  [attr.aria-label]="computedAriaLabel"
  [class]="classes"
  (click)="$event.stopPropagation()"
>
  <i *ngIf="iconClass" [class]="iconClass" aria-hidden="true"></i>
  <span class="whitespace-nowrap">{{ label }}</span>
</a>

<ng-template #asButton>
  <button
    type="button"
    [disabled]="disabled"
    [attr.aria-label]="computedAriaLabel"
    [class]="classes"
    (click)="onClick($event)"
  >
    <i *ngIf="iconClass" [class]="iconClass" aria-hidden="true"></i>
    <span class="whitespace-nowrap">{{ label }}</span>
  </button>
</ng-template>
