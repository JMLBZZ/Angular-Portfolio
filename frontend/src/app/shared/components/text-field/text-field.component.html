<div class="space-y-2">
  <label
    *ngIf="label"
    class="text-sm font-semibold"
    [attr.for]="computedId"
  >
    {{ label }}
  </label>

  <input
    [id]="computedId"
    [type]="type"
    [formControl]="control"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [class]="inputClasses"
    [attr.aria-invalid]="showError ? 'true' : 'false'"
    [attr.aria-describedby]="describedBy"
  />

  <p
    *ngIf="showError && errorText"
    class="text-xs text-red-500"
    [id]="errorId"
  >
    {{ errorText }}
  </p>
</div>
