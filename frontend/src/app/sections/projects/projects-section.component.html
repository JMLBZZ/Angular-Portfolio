<section id="projects" class="py-24 scroll-mt-24">
    <div class="max-w-6xl mx-auto px-4">

        <!-- Titre -->
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold">
                {{ 'projects.title' | translate }}
            </h2>
            <p class="mt-3 text-foreground/70">
                {{ 'projects.subtitle' | translate }}
            </p>
        </div>

        <!-- Filtres -->
        <div class="flex flex-wrap justify-center gap-3 mb-12">
            <button
                *ngFor="let filter of filters"
                type="button"
                (click)="setFilter(filter.value)"
                class="px-4 py-2 rounded-full border text-sm font-medium transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/40"
                [ngClass]="{
                    'bg-primary text-primary-foreground border-primary shadow-soft': activeFilter === filter.value,
                    'bg-card border-border text-foreground hover:bg-muted': activeFilter !== filter.value
                }">
                {{ filter.label | translate }}
            </button>
        </div>

        <!-- Chargement -->
        <div *ngIf="isLoading" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
            <div
                *ngFor="let item of [1,2,3]"
                class="overflow-hidden rounded-2xl border border-border bg-card shadow-soft"
            >
                <div class="h-44 w-full animate-pulse bg-gradient-to-br from-muted via-background/60 to-muted"></div>
                <div class="p-6">
                    <div class="h-5 w-2/3 rounded bg-muted animate-pulse"></div>
                    <div class="mt-3 h-4 w-full rounded bg-muted animate-pulse"></div>
                    <div class="mt-2 h-4 w-4/5 rounded bg-muted animate-pulse"></div>
                    <div class="mt-4 flex gap-2">
                        <div class="h-6 w-16 rounded-full bg-muted animate-pulse"></div>
                        <div class="h-6 w-20 rounded-full bg-muted animate-pulse"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Erreur -->
        <div
            *ngIf="!isLoading && hasError"
            class="rounded-2xl border border-red-200 bg-red-50 px-6 py-10 text-center text-red-700 dark:border-red-900/40 dark:bg-red-950/30 dark:text-red-300"
        >
            Impossible de charger les projets pour le moment.
        </div>

        <!-- Projects Grid -->
        <div *ngIf="!isLoading && !hasError && filteredProjects.length > 0; else emptyState" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">

            <div
                *ngFor="let project of filteredProjects"
                (click)="openProject(project)"
                class="group relative cursor-pointer overflow-hidden rounded-2xl border border-border bg-card shadow-soft transition hover:-translate-y-1"
            >

                <!-- Cover -->
                <div class="relative h-44 w-full overflow-hidden bg-muted">
                    <!-- Placeholder de chargement -->
                    <div
                        *ngIf="project.cover && !isImageLoaded(project) && !hasImageError(project)"
                        class="absolute inset-0 animate-pulse bg-gradient-to-br from-muted via-background/60 to-muted"
                        aria-hidden="true"
                    ></div>

                    <!-- Image -->
                    <img
                        *ngIf="project.cover && !hasImageError(project); else fallbackCover"
                        [src]="project.cover"
                        [alt]="project.title"
                        class="absolute inset-0 h-full w-full object-cover transition duration-500 group-hover:scale-[1.04]"
                        [class.opacity-0]="!isImageLoaded(project)"
                        [class.opacity-100]="isImageLoaded(project)"
                        loading="lazy"
                        decoding="async"
                        fetchpriority="low"
                        width="800"
                        height="450"
                        (load)="onImageLoad(project)"
                        (error)="onImageError(project)"
                    />

                    <ng-template #fallbackCover>
                        <div class="absolute inset-0 flex items-center justify-center bg-muted">
                            <span class="text-xs text-foreground/50">No preview - Aucun aperçu</span>
                        </div>
                    </ng-template>

                    <!-- Categorie du badge -->
                    <div class="absolute left-4 top-4 z-10">
                        <span
                            class="rounded-full border border-border bg-card/80 px-3 py-1 text-xs text-foreground/70 backdrop-blur">
                            {{ project.category | uppercase }}
                        </span>
                    </div>

                    <!-- Hover overlay -->
                    <div
                        class="absolute inset-0 z-[1] bg-black/55 opacity-0 transition duration-300 group-hover:opacity-100">
                    </div>

                    <!-- Hover button DETAIL -->
                    <div class="absolute inset-0 z-[2] flex items-center justify-center opacity-0 transition duration-300 group-hover:opacity-100">
                        <app-action-button
                            variant="solid"
                            [label]="'projects.card.detail' | translate"
                            [ariaLabel]="'projects.card.detail' | translate"
                            (pressed)="openProject(project)"
                        >
                        </app-action-button>
                    </div>
                </div>

                <!-- Content -->
                <div class="p-6">
                    <h3 class="text-lg font-semibold">
                        {{ project.title }}
                    </h3>

                    <p class="mt-2 text-sm text-foreground/70">
                        {{ loc(project.description) }}
                    </p>

                    <div class="mt-4 flex flex-wrap gap-2">
                        <span
                            *ngFor="let tag of project.tags"
                            class="text-xs px-2 py-1 rounded-full border border-border bg-background/60 text-foreground/70">
                            {{ tag }}
                        </span>
                    </div>
                </div>

                <!-- Effet "gold glow" -->
                <div
                    class="pointer-events-none absolute -bottom-10 -right-10 h-32 w-32 rounded-full bg-primary/15 blur-2xl opacity-0 transition group-hover:opacity-100">
                </div>

            </div>

        </div>

        <!-- Vide -->
        <ng-template #emptyState>
            <div *ngIf="!isLoading && !hasError" class="text-center py-16 text-foreground/60">
                {{ 'projects.empty' | translate }}
            </div>
        </ng-template>

    </div>
</section>
