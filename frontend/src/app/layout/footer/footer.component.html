<footer class="mt-20 border-t border-border/70">
    <div class="max-w-6xl mx-auto px-6 lg:px-10 py-14">
        <div class="grid gap-10 lg:grid-cols-3 text-center lg:text-left">
            <!-- LEFT -->
            <div class="space-y-3 flex flex-col items-center lg:items-start">
                <div class="text-2xl font-extrabold tracking-tight">
                    <span class="text-primary">J</span><span>B</span>
                </div>

                <p class="text-sm text-foreground/70">
                    Jamel <span class="font-semibold text-foreground/80">BOUAZZA</span> – Développeur Full-Stack
                </p>
            </div>

            <!-- CENTER -->
            <div class="space-y-3 flex flex-col items-center lg:items-start lg:justify-self-center">
                <h3 class="text-base font-semibold">
                    {{ 'footer.navigation' | translate }}
                </h3>

                <nav class="flex flex-col gap-2 text-sm text-foreground/70 items-center lg:items-start">
                    <button class="hover:text-primary transition" (click)="scrollTo('home')">
                        {{ 'header.home' | translate }}
                    </button>
                    <button class="hover:text-primary transition" (click)="scrollTo('projects')">
                        {{ 'header.projects' | translate }}
                    </button>
                    <button class="hover:text-primary transition" (click)="scrollTo('about')">
                        {{ 'header.about' | translate }}
                    </button>
                    <button class="hover:text-primary transition" (click)="scrollTo('contact')">
                        {{ 'header.contact' | translate }}
                    </button>
                </nav>
            </div>

            <!-- RIGHT -->
            <div class="space-y-3 flex flex-col items-center lg:items-end lg:justify-self-end">
                <h3 class="text-base font-semibold">
                    {{ 'footer.follow' | translate }}
                </h3>

                <div class="flex items-center justify-center lg:justify-end gap-3">
                    <app-icon-button ariaLabel="GitHub" [href]="githubUrl" iconClass="bi bi-github"></app-icon-button>

                    <app-icon-button ariaLabel="LinkedIn" [href]="linkedinUrl"
                        iconClass="bi bi-linkedin"></app-icon-button>

                    <app-icon-button ariaLabel="Email" [href]="'mailto:' + email"
                        iconClass="bi bi-envelope-fill"></app-icon-button>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="mt-10 border-t border-border/70"></div>

        <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between
            text-sm text-foreground/60 text-center sm:text-left">
            <div>
                {{ 'footer.rights' | translate:{ year: year } }}
            </div>

            <div class="sm:text-right">
                {{ 'footer.madeWith' | translate }}
            </div>
        </div>
    </div>
</footer>
